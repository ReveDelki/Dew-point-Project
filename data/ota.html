<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OTA Update</title>
  <!-- Simple styling for the OTA update page -->
  <style>
    :root { --fg:#e5e7eb; --mut:#9ca3af; --b:#1f2937; --warn:#f87171; --bg:#0b1220; --card:#0f172a; --box:#020617; --btn:#111827; --btnh:#1f2937; --link:#60a5fa }
    
    body { font-family: system-ui; margin: 16px; color:var(--fg); background:var(--bg); }
    .card { max-width: 720px; margin:auto; border:1px solid var(--b); border-radius:12px; padding:16px; background:var(--card); }
    .box { border:1px solid var(--b); border-radius:10px; padding:12px; margin-top:12px; background:var(--box); }
    
    button { padding:8px 12px; border:1.5px solid #334155; border-radius:8px; background:var(--btn); color:var(--fg); cursor:pointer; }
    button:hover { border-color:var(--link); }

    .warn { color:var(--warn); }
    a { color:var(--link); text-decoration:none; }
    a:hover { text-decoration:underline; }
    input[type="file"]{ color:var(--fg); }
  </style>
</head>
<body>
  <div class="card">
    <h2>Update Software</h2>

    <div class="box">
      <h3>Firmware Update (firmware.bin)</h3>
      <!-- match the firmware endpoint -->
      <form method="POST" action="/updateAction?type=firmware" enctype="multipart/form-data">
        <input type="file" name="bin" accept=".bin" required><br><br>
        <button type="submit">Upload Firmware</button>
      </form>
    </div>

    <div class="box">
      <h3>LittleFS Update (littlefs.bin)</h3>
      <!-- match the littlefs endpoint -->
      <form method="POST" action="/updateAction?type=filesystem" enctype="multipart/form-data">
        <input type="file" name="bin" accept=".bin" required><br><br>
        <button type="submit">Upload LittleFS</button>
      </form>
    </div>

    <p class="warn">Device will reboot automatically after upload.</p>
    <p><a href="/">← Back to main page</a></p>
  </div>
</body>
</html>
